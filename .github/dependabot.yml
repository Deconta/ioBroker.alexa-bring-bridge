# Dependabot will run on day 7 of each month at 03:52 (Europe/Berlin timezone)
version: 2
updates:

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '52 3 7 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'julian'
    versioning-strategy: 'increase'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      timezone: 'Europe/Berlin'
      cronjob: '52 3 7 * *'
    open-pull-requests-limit: 15
    assignees:
      - 'julian'
